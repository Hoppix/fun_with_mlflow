apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
  labels: { app: mlflow }
spec:
  replicas: 1
  strategy: { type: Recreate }      # single replica + PVC, no rolling
  selector:
    matchLabels: { app: mlflow }
  template:
    metadata:
      labels: { app: mlflow }
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.12.0
          command: ["mlflow"]
          args:
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:////mlflow/backend/mlflow.db
            - --default-artifact-root=s3://mlflow-artifacts/
            - --allowed-hosts=*
          ports:
            - { name: http, containerPort: 5000 }
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio.minio.svc.cluster.local:9000
            - name: MLFLOW_S3_IGNORE_TLS
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: mlflow-s3-credentials, key: AWS_ACCESS_KEY_ID } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: mlflow-s3-credentials, key: AWS_SECRET_ACCESS_KEY } }
          volumeMounts:
            - { name: backend, mountPath: /mlflow/backend }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: backend
          persistentVolumeClaim: { claimName: mlflow-backend }