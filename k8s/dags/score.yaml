apiVersion: batch/v1
kind: Job
metadata:
  generateName: score-
  namespace: default
  labels:
    app: zeit-mlops
    component: score
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels: { app: zeit-mlops, component: score }
    spec:
      restartPolicy: Never
      containers:
        - name: score
          image: zeit-mlops:latest
          imagePullPolicy: IfNotPresent
          args: ["src.score"]
          env:
            - { name: MLFLOW_TRACKING_URI,    value: "http://mlflow.mlflow.svc.cluster.local:5000" }
            - { name: MLFLOW_S3_ENDPOINT_URL, value: "http://minio.minio.svc.cluster.local:9000" }
            - { name: MLFLOW_MODEL_NAME,      value: "zeit-churn-classifier" }
            - { name: SCORES_BUCKET,          value: "scores" }
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: s3-credentials, key: AWS_ACCESS_KEY_ID } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: s3-credentials, key: AWS_SECRET_ACCESS_KEY } }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi  }